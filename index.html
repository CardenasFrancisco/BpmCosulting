<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPM Consulting - Consultar Certificado</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #2d0a6e 0%, #1a0540 55%, #0a011f 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 36px 34px 30px;
    width: 420px;
    max-width: 95vw;
    text-align: center;
  }
  .logo-img {
    width: 100%;
    max-width: 310px;
    margin: 0 auto 22px;
    display: block;
    border-radius: 6px;
  }
  h1 {
    color: #1a0540;
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 18px;
  }
  input[type="text"] {
    width: 100%;
    border: 1.5px solid #b0b0cc;
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 15px;
    color: #222;
    outline: none;
    transition: border 0.2s;
    margin-bottom: 12px;
  }
  input[type="text"]:focus { border-color: #3a1a8a; }
  .btn-buscar {
    background: #3a3a5a;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 10px 28px;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.2s;
    display: block;
  }
  .btn-buscar:hover { background: #1a0540; }
  .login-prompt { margin-top: 22px; font-size: 14px; color: #444; text-align: left; }
  .btn-login {
    display: inline-block;
    background: #d42b2b;
    color: #fff;
    border-radius: 6px;
    padding: 9px 20px;
    font-size: 14px;
    cursor: pointer;
    margin-top: 8px;
    text-decoration: none;
    transition: background 0.2s;
  }
  .btn-login:hover { background: #a81e1e; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,0,30,0.72);
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #fff;
    border-radius: 10px;
    width: 490px;
    max-width: 94vw;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35);
  }
  .modal-header {
    background: #2d3a6e;
    color: #fff;
    padding: 14px 20px;
    font-size: 16px;
    font-weight: 600;
  }
  .modal-body { padding: 20px 24px; font-size: 15px; color: #222; }
  .modal-body .cert-label {
    font-size: 12px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .cert-item {
    border-bottom: 1px solid #eee;
    padding: 8px 0;
  }
  .cert-item:last-child { border-bottom: none; }
  .cert-name { font-weight: 700; color: #1a0540; font-size: 15px; }
  .cert-code { color: #666; font-size: 13px; margin-top: 2px; }
  .modal-footer {
    padding: 12px 20px;
    text-align: right;
    border-top: 1px solid #eee;
  }
  .btn-cerrar {
    background: #d42b2b;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 9px 22px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-cerrar:hover { background: #a81e1e; }

  /* WhatsApp */
  .whatsapp {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #25d366;
    color: #fff;
    border-radius: 50px;
    padding: 11px 18px 11px 13px;
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  }
  .whatsapp svg { width: 24px; height: 24px; fill: #fff; flex-shrink: 0; }
</style>
</head>

<script>
// ============================================================
//  ARRAY DE USUARIOS — agrega o edita entradas aquí
//  Cada usuario puede tener múltiples certificados
// ============================================================
const usuarios = [
  {
    cedula: "1065846963",
    nombre: "Francisco Javier Cardenas Romero",
    certificados: [
      { nombre: "Manipulación de alimentos", codigo: "6006f8f7a832b" }
    ]
  },
  {
    cedula: "1047240332",
    nombre: "Isamar de las salas ",
    certificados: [
      { nombre: "Manipulación de alimentos", codigo: "987706f8fk" }
    ]
  }
  // Añade más usuarios con el mismo formato:
  // {
  //   cedula: "NUMERO_CEDULA",
  //   nombre: "NOMBRE COMPLETO",
  //   certificados: [
  //     { nombre: "NOMBRE CURSO", codigo: "CODIGO" }
  //   ]
  // },
];
// ============================================================

function buscar() {
  const cedula = document.getElementById('cedula').value.trim();
  if (!cedula) return;

  const usuario = usuarios.find(u => u.cedula === cedula);

  if (!usuario) {
    document.getElementById('modalError').classList.add('active');
  } else {
    document.getElementById('modalNombre').textContent =
      usuario.nombre + ' - ' + usuario.cedula;

    const lista = document.getElementById('listaCerts');
    lista.innerHTML = usuario.certificados.map(c =>
      '<div class="cert-item">' +
        '<div class="cert-name">' + c.nombre + '</div>' +
        '<div class="cert-code">' + c.codigo + '</div>' +
      '</div>'
    ).join('');

    document.getElementById('modalExito').classList.add('active');
  }
}

function cerrar(id) {
  document.getElementById(id).classList.remove('active');
}

document.getElementById('cedula').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') buscar();
});
</script>
